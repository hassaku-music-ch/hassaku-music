name: Update YouTube Playlists

on:
  schedule:
    # Run every day at 0:00 UTC (9:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch latest playlists
        run: node fetchPlaylists.mjs

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/data.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data.json
          git commit -m "Auto-update YouTube playlists"
          git push
